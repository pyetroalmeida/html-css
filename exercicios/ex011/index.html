<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou aumente e diminua o tamanho do seu navegador. </p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto1.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto2.png" type="image/png">
        <img src="imagens/foto33.png" alt="Foto grande">        
    </picture>
    
    <h1>Reproduzindo áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <!-- MP3, WAV, OGG  -->
     <audio preload="auto" autoplay controls loop>
        <source src="midias/musica.mp3" type="audio/mpeg">
        <p>Infelizmente seu navegador não consegue reproduzir áudios. <a href="midias/musica.mp3">Clique aqui</a> para baixar o arquivo MP3
        </p>
     </audio>
</body>
</html>
