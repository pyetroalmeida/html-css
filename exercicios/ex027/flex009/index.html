<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row wrap;
        }

        .item{
            background-color: rgb(17, 215, 103);
            border: 1px solid black;
            text-align: center;
            flex-basis: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">Conteúdo maior para fazer o exemplo</div>
        <div class="item">Menor</div>
        <div class="item">D</div>
        <div class="item">Es</div>
        <div class="item">F</div>
        <div class="item">G</div>
    </div>
</body>
</html>
