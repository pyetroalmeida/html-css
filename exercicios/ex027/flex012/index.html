<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        .container{
            background-color: lightsalmon;

            display: flex;
            flex-flow: row nowrap;
        }

        .item{
            background-color: rgb(17, 215, 103);
            border: 1px solid black;
            text-align: center;
           
           
        }

        #a{
            /* flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 200px; */

            flex: 1 0 200px;
        }
        
        #b{
            /* flex-shrink: 1;
            flex-grow: 2;
            flex-basis: 150px; */

            flex: 2 1 150px;
        }
        
        #c{
            /* flex-shrink: 3;
            flex-grow: 2;
            flex-basis: auto; */

            flex: 2 3 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="a">A</div>
        <div class="item" id="b">B</div>
        <div class="item" id="c">C</div>
    </div>
</body>
</html>
