<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <fieldset>
        <legend>Dados pessoais</legend>
        <p>
            <label for="inome">Nome</label>
            <input type="text" name="nome" id="inome">
        </p>
        <p>
            <label for="imail">Email</label>
            <input type="email" name="email" id="imail" autocomplete="email" required>
        </p>
        <p>
            <label for="itelefone">Telefone</label>
            <input type="tel" name="Telefone" id="itelefone" autocomplete="tel" pattern="^[0-9]{4,5}-[0-9]{4}$"  required>
        </p>
        <p>
    </fieldset>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
    </form>
</body>
</html>
